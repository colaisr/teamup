version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: teamup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamup}
      POSTGRES_USER: ${POSTGRES_USER:-teamup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamup}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamup} -d ${POSTGRES_DB:-teamup}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: teamup_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-teamup}:${POSTGRES_PASSWORD:-teamup}@postgres:5432/${POSTGRES_DB:-teamup}
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\""]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
    container_name: teamup_frontend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${TEAMUP_DOMAIN}/api-proxy
      NEXT_PUBLIC_DEFAULT_LOCALE: ru
      NEXT_PUBLIC_FALLBACK_LOCALE: en
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: teamup_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  certbot_www:

