# Local development: PostgreSQL only (backend/frontend run on the host).
#
# From repo root:
#   docker compose -f infra/docker-compose.postgres.yml up -d
#
# Stop / remove (keeps volume):
#   docker compose -f infra/docker-compose.postgres.yml down
#
# Default DATABASE_URL matches .env.example — postgresql+psycopg2://teamup:teamup@localhost:5432/teamup
# If port 5432 is already in use, change the left side of ports below and DATABASE_URL host port.

services:
  postgres:
    image: postgres:16-alpine
    container_name: teamup_postgres_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamup}
      POSTGRES_USER: ${POSTGRES_USER:-teamup}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-teamup}
    volumes:
      - teamup_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-teamup} -d ${POSTGRES_DB:-teamup}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  teamup_postgres_dev:
